<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modern Admin Dashboard</title>
    
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- SweetAlert2 -->
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    
    <!-- Anime.js -->
    <script src="https://cdn.jsdelivr.net/npm/animejs/dist/bundles/anime.umd.min.js"></script>

    <style>
        :root {
            --primary-color: #4f46e5;
            --primary-hover: #4338ca;
            --bg-body: #f9fafb;
            --bg-card: #ffffff;
            --bg-sidebar: #ffffff;
            --text-main: #111827;
            --text-muted: #6b7280;
            --border-color: #e5e7eb;
            --sidebar-width: 260px;
            --sidebar-collapsed-width: 80px;
            --transition-speed: 0.3s;
            --shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1), 0 2px 4px -2px rgb(0 0 0 / 0.1);
        }

        .dark-mode {
            --bg-body: #0f172a;
            --bg-card: #1e293b;
            --bg-sidebar: #1e293b;
            --text-main: #f1f5f9;
            --text-muted: #94a3b8;
            --border-color: #334155;
            --shadow: 0 10px 15px -3px rgb(0 0 0 / 0.4);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', sans-serif;
        }

        body {
            background-color: var(--bg-body);
            color: var(--text-main);
            transition: background-color var(--transition-speed), color var(--transition-speed);
            overflow-x: hidden;
        }

        /* Layout Structure */
        .wrapper {
            display: flex;
            min-height: 100vh;
        }

        /* Sidebar Styling */
        aside {
            width: var(--sidebar-width);
            background-color: var(--bg-sidebar);
            border-right: 1px solid var(--border-color);
            transition: width var(--transition-speed);
            position: fixed;
            height: 100vh;
            z-index: 1000;
        }

        aside.collapsed {
            width: var(--sidebar-collapsed-width);
        }

        .sidebar-header {
            padding: 20px;
            display: flex;
            align-items: center;
            gap: 12px;
            border-bottom: 1px solid var(--border-color);
        }

        .logo-box {
            width: 35px;
            height: 35px;
            background: var(--primary-color);
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: bold;
        }

        .logo-text {
            font-weight: 700;
            font-size: 1.2rem;
            white-space: nowrap;
            opacity: 1;
            transition: opacity 0.2s;
        }

        .collapsed .logo-text {
            opacity: 0;
            pointer-events: none;
        }

        .sidebar-menu {
            padding: 20px 10px;
            list-style: none;
        }

        .menu-item {
            margin-bottom: 5px;
        }

        .menu-link {
            display: flex;
            align-items: center;
            padding: 12px 15px;
            color: var(--text-muted);
            text-decoration: none;
            border-radius: 8px;
            gap: 15px;
            transition: all 0.2s;
            position: relative;
        }

        .menu-link:hover, .menu-link.active {
            background-color: var(--primary-color);
            color: white;
        }

        .menu-link i {
            font-size: 1.2rem;
            min-width: 24px;
            text-align: center;
        }

        .menu-text {
            white-space: nowrap;
            transition: opacity 0.2s;
        }

        .collapsed .menu-text {
            opacity: 0;
        }

        /* Main Content */
        main {
            flex: 1;
            margin-left: var(--sidebar-width);
            transition: margin-left var(--transition-speed);
            padding: 20px;
            width: 100%;
        }

        .collapsed + main {
            margin-left: var(--sidebar-collapsed-width);
        }

        /* Header / Topbar */
        header {
            background-color: var(--bg-card);
            padding: 15px 25px;
            border-radius: 12px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: var(--shadow);
            margin-bottom: 30px;
            border: 1px solid var(--border-color);
        }

        .topbar-left {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .toggle-btn {
            background: none;
            border: none;
            color: var(--text-main);
            font-size: 1.2rem;
            cursor: pointer;
            padding: 5px;
        }

        .topbar-right {
            display: flex;
            align-items: center;
            gap: 20px;
        }

        .action-btn {
            background: none;
            border: none;
            color: var(--text-muted);
            font-size: 1.1rem;
            cursor: pointer;
            position: relative;
        }

        .action-btn:hover {
            color: var(--primary-color);
        }

        .badge-notif {
            position: absolute;
            top: -5px;
            right: -5px;
            background: #ef4444;
            color: white;
            font-size: 0.6rem;
            padding: 2px 5px;
            border-radius: 10px;
        }

        /* Dashboard Content */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .stat-card {
            background-color: var(--bg-card);
            padding: 25px;
            border-radius: 12px;
            border: 1px solid var(--border-color);
            box-shadow: var(--shadow);
            display: flex;
            justify-content: space-between;
            align-items: center;
            overflow: hidden;
            position: relative;
        }

        .stat-info h4 {
            color: var(--text-muted);
            font-size: 0.9rem;
            font-weight: 500;
            margin-bottom: 8px;
        }

        .stat-info h2 {
            font-size: 1.8rem;
            font-weight: 700;
        }

        .stat-icon {
            width: 50px;
            height: 50px;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5rem;
        }

        .icon-blue { background: rgba(79, 70, 229, 0.1); color: #4f46e5; }
        .icon-green { background: rgba(34, 197, 94, 0.1); color: #22c55e; }
        .icon-orange { background: rgba(249, 115, 22, 0.1); color: #f97316; }
        .icon-purple { background: rgba(168, 85, 247, 0.1); color: #a855f7; }

        .content-card {
            background-color: var(--bg-card);
            border-radius: 12px;
            border: 1px solid var(--border-color);
            box-shadow: var(--shadow);
            padding: 25px;
            margin-bottom: 20px;
        }

        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        /* Buttons & Labels */
        .btn {
            padding: 10px 20px;
            border-radius: 8px;
            border: none;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }

        .btn-primary { background: var(--primary-color); color: white; }
        .btn-primary:hover { background: var(--primary-hover); transform: translateY(-2px); }

        .label {
            padding: 4px 10px;
            border-radius: 6px;
            font-size: 0.75rem;
            font-weight: 600;
            text-transform: uppercase;
        }

        .label-success { background: rgba(34, 197, 94, 0.1); color: #16a34a; }
        .label-warning { background: rgba(234, 179, 8, 0.1); color: #ca8a04; }

        /* Table Styling */
        .table-responsive {
            width: 100%;
            overflow-x: auto;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            text-align: left;
        }

        th {
            padding: 12px 15px;
            border-bottom: 1px solid var(--border-color);
            color: var(--text-muted);
            font-weight: 600;
            font-size: 0.85rem;
        }

        td {
            padding: 15px;
            border-bottom: 1px solid var(--border-color);
            font-size: 0.9rem;
        }

        /* Tooltip simple custom */
        [data-tooltip] {
            position: relative;
        }

        [data-tooltip]::after {
            content: attr(data-tooltip);
            position: absolute;
            bottom: 125%;
            left: 50%;
            transform: translateX(-50%);
            background: #1e293b;
            color: white;
            padding: 5px 10px;
            border-radius: 4px;
            font-size: 0.7rem;
            white-space: nowrap;
            visibility: hidden;
            opacity: 0;
            transition: opacity 0.2s;
        }

        [data-tooltip]:hover::after {
            visibility: visible;
            opacity: 1;
        }

        /* Modal Custom (Pure CSS & JS) */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 2000;
        }

        .modal-content {
            background: var(--bg-card);
            width: 90%;
            max-width: 500px;
            padding: 30px;
            border-radius: 12px;
            position: relative;
            transform: scale(0.8);
            opacity: 0;
            transition: all 0.3s;
        }

        .modal-overlay.active { display: flex; }
        .modal-overlay.active .modal-content { transform: scale(1); opacity: 1; }

        /* Mobile Responsive */
        @media (max-width: 1024px) {
            aside {
                left: -260px;
            }
            aside.mobile-active {
                left: 0;
            }
            main {
                margin-left: 0 !important;
            }
            .sidebar-overlay {
                display: none;
                position: fixed;
                inset: 0;
                background: rgba(0,0,0,0.5);
                z-index: 999;
            }
            .sidebar-overlay.active {
                display: block;
            }
        }

        @media (max-width: 640px) {
            header {
                flex-direction: column;
                gap: 15px;
                text-align: center;
            }
            .topbar-right {
                width: 100%;
                justify-content: center;
            }
        }
    </style>
</head>
<body>

    <div class="sidebar-overlay" id="sidebarOverlay"></div>

    <div class="wrapper">
        <!-- Sidebar -->
        <aside id="sidebar">
            <div class="sidebar-header">
                <div class="logo-box"><i class="fas fa-bolt"></i></div>
                <span class="logo-text">ADMIN PRO</span>
            </div>
            
            <ul class="sidebar-menu">
                <li class="menu-item">
                    <a href="#" class="menu-link active">
                        <i class="fas fa-th-large"></i>
                        <span class="menu-text">Dashboard</span>
                    </a>
                </li>
                <li class="menu-item">
                    <a href="#" class="menu-link">
                        <i class="fas fa-users"></i>
                        <span class="menu-text">Pengguna</span>
                    </a>
                </li>
                <li class="menu-item">
                    <a href="#" class="menu-link">
                        <i class="fas fa-shopping-cart"></i>
                        <span class="menu-text">Pesanan</span>
                    </a>
                </li>
                <li class="menu-item">
                    <a href="#" class="menu-link">
                        <i class="fas fa-chart-line"></i>
                        <span class="menu-text">Analitik</span>
                    </a>
                </li>
                <li class="menu-item">
                    <a href="#" class="menu-link">
                        <i class="fas fa-cog"></i>
                        <span class="menu-text">Pengaturan</span>
                    </a>
                </li>
            </ul>

            <div style="position: absolute; bottom: 20px; width: 100%; padding: 0 10px;">
                <a href="#" class="menu-link" id="logoutBtn">
                    <i class="fas fa-sign-out-alt"></i>
                    <span class="menu-text">Keluar</span>
                </a>
            </div>
        </aside>

        <!-- Main Content -->
        <main>
            <!-- Topbar -->
            <header>
                <div class="topbar-left">
                    <button class="toggle-btn" id="sidebarToggle">
                        <i class="fas fa-bars"></i>
                    </button>
                    <h3 style="font-size: 1.1rem;">Ringkasan Dashboard</h3>
                </div>

                <div class="topbar-right">
                    <button class="action-btn" id="themeToggle" data-tooltip="Ganti Tema">
                        <i class="fas fa-moon"></i>
                    </button>
                    <button class="action-btn" id="fullscreenToggle" data-tooltip="Layar Penuh">
                        <i class="fas fa-expand"></i>
                    </button>
                    <div class="action-btn" data-tooltip="Notifikasi">
                        <i class="fas fa-bell"></i>
                        <span class="badge-notif">3</span>
                    </div>
                    <div style="display: flex; align-items: center; gap: 10px; cursor: pointer;">
                        <img src="https://ui-avatars.com/api/?name=Admin+User&background=4f46e5&color=fff" alt="Profile" style="width: 35px; border-radius: 50%;">
                        <span style="font-weight: 600; font-size: 0.9rem;" class="mobile-hide">Admin User</span>
                    </div>
                </div>
            </header>

            <!-- Stats Grid -->
            <div class="stats-grid">
                <div class="stat-card">
                    <div class="stat-info">
                        <h4>Total Pendapatan</h4>
                        <h2>Rp 12.4M</h2>
                    </div>
                    <div class="stat-icon icon-blue">
                        <i class="fas fa-wallet"></i>
                    </div>
                </div>
                <div class="stat-card">
                    <div class="stat-info">
                        <h4>Pengguna Baru</h4>
                        <h2>1,240</h2>
                    </div>
                    <div class="stat-icon icon-green">
                        <i class="fas fa-user-plus"></i>
                    </div>
                </div>
                <div class="stat-card">
                    <div class="stat-info">
                        <h4>Pesanan Pending</h4>
                        <h2>45</h2>
                    </div>
                    <div class="stat-icon icon-orange">
                        <i class="fas fa-clock"></i>
                    </div>
                </div>
                <div class="stat-card">
                    <div class="stat-info">
                        <h4>Kepuasan</h4>
                        <h2>98%</h2>
                    </div>
                    <div class="stat-icon icon-purple">
                        <i class="fas fa-smile"></i>
                    </div>
                </div>
            </div>

            <!-- Table Card -->
            <div class="content-card">
                <div class="card-header">
                    <h3>Transaksi Terbaru</h3>
                    <button class="btn btn-primary" id="openModal">
                        <i class="fas fa-plus"></i> Tambah Data
                    </button>
                </div>
                <div class="table-responsive">
                    <table>
                        <thead>
                            <tr>
                                <th>ID Transaksi</th>
                                <th>Pelanggan</th>
                                <th>Produk</th>
                                <th>Tanggal</th>
                                <th>Status</th>
                                <th>Aksi</th>
                            </tr>
                        </thead>
                        <tbody id="tableBody">
                            <!-- JS will populate -->
                        </tbody>
                    </table>
                </div>
            </div>
        </main>
    </div>

    <!-- Modal Form -->
    <div class="modal-overlay" id="modalOverlay">
        <div class="modal-content">
            <h2 style="margin-bottom: 20px;">Tambah Transaksi Baru</h2>
            <div style="margin-bottom: 15px;">
                <label style="display: block; margin-bottom: 5px; font-size: 0.9rem;">Nama Pelanggan</label>
                <input type="text" placeholder="Masukkan nama..." style="width: 100%; padding: 10px; border: 1px solid var(--border-color); border-radius: 8px; background: var(--bg-body); color: var(--text-main);">
            </div>
            <div style="display: flex; gap: 10px; justify-content: flex-end; margin-top: 20px;">
                <button class="btn" style="background: var(--border-color); color: var(--text-main);" id="closeModal">Batal</button>
                <button class="btn btn-primary" id="saveData">Simpan Data</button>
            </div>
        </div>
    </div>

    <script>
        const { animate } = anime;

        // Elements
        const sidebar = document.getElementById('sidebar');
        const sidebarToggle = document.getElementById('sidebarToggle');
        const sidebarOverlay = document.getElementById('sidebarOverlay');
        const themeToggle = document.getElementById('themeToggle');
        const fullscreenToggle = document.getElementById('fullscreenToggle');
        const modalOverlay = document.getElementById('modalOverlay');
        const openModalBtn = document.getElementById('openModal');
        const closeModalBtn = document.getElementById('closeModal');
        const tableBody = document.getElementById('tableBody');
        const logoutBtn = document.getElementById('logoutBtn');

        // Initial Data for Table
        const transactions = [
            { id: "#TRX-001", name: "Budi Santoso", product: "Macbook Air M2", date: "24 Mei 2024", status: "Berhasil" },
            { id: "#TRX-002", name: "Siti Aminah", product: "iPhone 15 Pro", date: "23 Mei 2024", status: "Pending" },
            { id: "#TRX-003", name: "Andi Wijaya", product: "Logitech MX Master", date: "22 Mei 2024", status: "Berhasil" },
            { id: "#TRX-004", name: "Rina Kartika", product: "Keychron K2 V2", date: "21 Mei 2024", status: "Berhasil" },
        ];

        // Populate Table
        function renderTable() {
            tableBody.innerHTML = transactions.map(t => `
                <tr>
                    <td><strong>${t.id}</strong></td>
                    <td>${t.name}</td>
                    <td>${t.product}</td>
                    <td>${t.date}</td>
                    <td><span class="label ${t.status === 'Berhasil' ? 'label-success' : 'label-warning'}">${t.status}</span></td>
                    <td>
                        <button class="action-btn" onclick="viewAction('${t.id}')"><i class="fas fa-eye"></i></button>
                        <button class="action-btn" onclick="deleteAction('${t.id}')"><i class="fas fa-trash"></i></button>
                    </td>
                </tr>
            `).join('');
        }

        // Sidebar Toggles
        sidebarToggle.addEventListener('click', () => {
            if (window.innerWidth <= 1024) {
                sidebar.classList.toggle('mobile-active');
                sidebarOverlay.classList.toggle('active');
            } else {
                sidebar.classList.toggle('collapsed');
            }
        });

        sidebarOverlay.addEventListener('click', () => {
            sidebar.classList.remove('mobile-active');
            sidebarOverlay.classList.remove('active');
        });

        // Theme Toggle
        themeToggle.addEventListener('click', () => {
            document.body.classList.toggle('dark-mode');
            const icon = themeToggle.querySelector('i');
            if (document.body.classList.contains('dark-mode')) {
                icon.className = 'fas fa-sun';
                localStorage.setItem('theme', 'dark');
            } else {
                icon.className = 'fas fa-moon';
                localStorage.setItem('theme', 'light');
            }
        });

        // Fullscreen Toggle
        fullscreenToggle.addEventListener('click', () => {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen();
                fullscreenToggle.querySelector('i').className = 'fas fa-compress';
            } else {
                if (document.exitFullscreen) {
                    document.exitFullscreen();
                    fullscreenToggle.querySelector('i').className = 'fas fa-expand';
                }
            }
        });

        // Modal Logic
        openModalBtn.addEventListener('click', () => {
            modalOverlay.classList.add('active');
        });

        closeModalBtn.addEventListener('click', () => {
            modalOverlay.classList.remove('active');
        });

        document.getElementById('saveData').addEventListener('click', () => {
            Swal.fire({
                title: 'Berhasil!',
                text: 'Data transaksi telah disimpan.',
                icon: 'success',
                confirmButtonColor: '#4f46e5'
            });
            modalOverlay.classList.remove('active');
        });

        // Actions
        window.viewAction = (id) => {
            Swal.fire(`Melihat detail: ${id}`);
        };

        window.deleteAction = (id) => {
            Swal.fire({
                title: 'Hapus data?',
                text: "Data tidak bisa dikembalikan!",
                icon: 'warning',
                showCancelButton: true,
                confirmButtonColor: '#ef4444',
                cancelButtonColor: '#6b7280',
                confirmButtonText: 'Ya, Hapus!'
            }).then((result) => {
                if (result.isConfirmed) {
                    Swal.fire('Terhapus!', 'Data berhasil dihapus.', 'success');
                }
            });
        };

        logoutBtn.addEventListener('click', (e) => {
            e.preventDefault();
            Swal.fire({
                title: 'Keluar Sesi?',
                text: "Anda akan diarahkan ke halaman login.",
                icon: 'question',
                showCancelButton: true,
                confirmButtonColor: '#4f46e5'
            }).then((result) => {
                if (result.isConfirmed) window.location.reload();
            });
        });

        // Initial Theme Load
        if (localStorage.getItem('theme') === 'dark') {
            document.body.classList.add('dark-mode');
            themeToggle.querySelector('i').className = 'fas fa-sun';
        }

        // Animations with Anime.js
        window.onload = () => {
            renderTable();

            // Fade in Stat Cards
            animate({
                targets: '.stat-card',
                translateY: [20, 0],
                opacity: [0, 1],
                delay: anime.stagger(100),
                easing: 'easeOutExpo'
            });

            // Fade in Header
            animate({
                targets: 'header',
                translateY: [-20, 0],
                opacity: [0, 1],
                easing: 'easeOutExpo',
                duration: 1000
            });

            // Fade in Table
            animate({
                targets: '.content-card',
                scale: [0.95, 1],
                opacity: [0, 1],
                easing: 'easeOutExpo',
                delay: 400
            });
        };
    </script>
</body>
</html>
